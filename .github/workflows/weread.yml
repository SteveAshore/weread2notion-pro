name: weread note sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时执行一次
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
      CC_URL: ${{ secrets.CC_URL }}
      CC_ID: ${{ secrets.CC_ID }}
      CC_PASSWORD: ${{ secrets.CC_PASSWORD }}
      BOOK_DATABASE_NAME: ${{ vars.BOOK_DATABASE_NAME }}
      AUTHOR_DATABASE_NAME: ${{ vars.AUTHOR_DATABASE_NAME }}
      CATEGORY_DATABASE_NAME: ${{ vars.CATEGORY_DATABASE_NAME }}
      BOOKMARK_DATABASE_NAME: ${{ vars.BOOKMARK_DATABASE_NAME }}
      REVIEW_DATABASE_NAME: ${{ vars.REVIEW_DATABASE_NAME }}
      CHAPTER_DATABASE_NAME: ${{ vars.CHAPTER_DATABASE_NAME }}
      YEAR_DATABASE_NAME: ${{ vars.YEAR_DATABASE_NAME }}
      WEEK_DATABASE_NAME: ${{ vars.WEEK_DATABASE_NAME }}
      MONTH_DATABASE_NAME: ${{ vars.MONTH_DATABASE_NAME }}
      DAY_DATABASE_NAME: ${{ vars.DAY_DATABASE_NAME }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      REF: ${{ github.ref }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # ✅ 在同步前验证 Cookie
      - name: Verify Cookie
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "
          import logging
          logging.basicConfig(level=logging.DEBUG, format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
          
          from weread2notionpro.cookie_manager import CookieManager
          import sys
          manager = CookieManager()
          cookies = manager.get_cookies()
          if cookies and manager.is_valid:
              print('✅ Cookie 验证成功')
              sys.exit(0)
          else:
              print('❌ Cookie 无效或获取失败')
              sys.exit(1)
          "
      
      - name: weread book sync
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "
          import logging
          import traceback
          import sys
          
          # 设置日志级别
          import os
          log_level = os.getenv('LOG_LEVEL', 'INFO')
          logging.basicConfig(level=getattr(logging, log_level), format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
          print(f'📊 日志级别: {log_level}')
          
          try:
              print('🚀 开始同步书架...')
              from weread2notionpro.book import main
              main()
              print('✅ 书架同步完成')
          except Exception as e:
              print(f'❌ 书架同步失败: {e}')
              traceback.print_exc()
              sys.exit(1)
          "
          
      - name: weread sync
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "
          import logging
          import traceback
          import sys
          
          # 设置日志级别
          import os
          log_level = os.getenv('LOG_LEVEL', 'INFO')
          logging.basicConfig(level=getattr(logging, log_level), format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
          print(f'📊 日志级别: {log_level}')
          
          try:
              print('🚀 开始同步笔记...')
              from weread2notionpro.weread import main
              main()
              print('✅ 笔记同步完成')
          except Exception as e:
              print(f'❌ 笔记同步失败: {e}')
              traceback.print_exc()
              sys.exit(1)
          "
