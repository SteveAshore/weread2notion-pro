name: read time sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write  # 允许写入仓库内容

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
      CC_URL: ${{ secrets.CC_URL }}
      CC_ID: ${{ secrets.CC_ID }}
      CC_PASSWORD: ${{ secrets.CC_PASSWORD }}
      HEATMAP_BLOCK_ID: ${{ secrets.HEATMAP_BLOCK_ID }}
      BOOK_DATABASE_NAME: ${{ vars.BOOK_DATABASE_NAME }}
      AUTHOR_DATABASE_NAME: ${{ vars.AUTHOR_DATABASE_NAME }}
      CATEGORY_DATABASE_NAME: ${{ vars.CATEGORY_DATABASE_NAME }}
      BOOKMARK_DATABASE_NAME: ${{ vars.BOOKMARK_DATABASE_NAME }}
      REVIEW_DATABASE_NAME: ${{ vars.REVIEW_DATABASE_NAME }}
      CHAPTER_DATABASE_NAME: ${{ vars.CHAPTER_DATABASE_NAME }}
      YEAR_DATABASE_NAME: ${{ vars.YEAR_DATABASE_NAME }}
      WEEK_DATABASE_NAME: ${{ vars.WEEK_DATABASE_NAME }}
      MONTH_DATABASE_NAME: ${{ vars.MONTH_DATABASE_NAME }}
      DAY_DATABASE_NAME: ${{ vars.DAY_DATABASE_NAME }}
      REF: ${{ github.ref }}
      REPOSITORY: ${{ github.repository }}
      YEAR: ${{ vars.YEAR }}
      # 颜色配置
      BACKGROUND_COLOR: ${{ vars.background_color || '#FFFFFF' }}
      TRACK_COLOR: ${{ vars.track_color || '#ACE7AE' }}
      SPECIAL_COLOR1: ${{ vars.special_color || '#69C16E' }}
      SPECIAL_COLOR2: ${{ vars.special_color2 || '#549F57' }}
      DOM_COLOR: ${{ vars.dom_color || '#EBEDF0' }}
      TEXT_COLOR: ${{ vars.text_color || '#000000' }}
      NAME: ${{ secrets.NAME || '微信读书' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y notion-client  # 卸载可能缓存的旧版本
          pip install "notion-client<3.0"  # 强制安装指定版本
          pip install -r requirements.txt
          pip install -e .  # 安装本地包
      # ✅ 验证 Cookie
      - name: Verify Cookie
        run: |
          python -c "
          from weread2notionpro.cookie_manager import CookieManager
          import sys
          manager = CookieManager()
          cookies = manager.get_cookies()
          if cookies and manager.is_valid:
              print('✅ Cookie 验证成功')
              sys.exit(0)
          else:
              print('❌ Cookie 无效或获取失败')
              sys.exit(1)
          "
      - name: Remove folder
        run: rm -rf ./OUT_FOLDER
      - name: Set default year if not provided
        run: echo "YEAR=$(date +"%Y")" >> $GITHUB_ENV
        if: env.YEAR == ''
      # ✅ 使用 Python 生成热力图（替代 github_heatmap）
      - name: Generate WeRead Heatmap
        run: |
          python -m weread2notionpro.heatmap_generator \
            --year ${YEAR:-$(date +"%Y")} \
            --output "OUT_FOLDER/weread.svg" \
            --title "${NAME}阅读热力图" \
            --background-color "$BACKGROUND_COLOR" \
            --track-color "$TRACK_COLOR" \
            --special-color1 "$SPECIAL_COLOR1" \
            --special-color2 "$SPECIAL_COLOR2" \
            --dom-color "$DOM_COLOR" \
            --text-color "$TEXT_COLOR"
      - name: Rename weread.svg to a random name
        run: |
          cd OUT_FOLDER
          find . -type f ! -name "weread.svg" -exec rm -f {} +
          cd ..
          RANDOM_FILENAME=$(uuidgen).svg
          mv ./OUT_FOLDER/weread.svg ./OUT_FOLDER/$RANDOM_FILENAME
          echo "Renamed file to $RANDOM_FILENAME"
      - name: push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m 'add new heatmap' || echo "nothing to commit"
          git push || echo "nothing to push"
      - name: read time sync
        run: |
          read_time
